name: Render and Publish Quarto Slides Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        run: |
          quarto render fastapi.qmd

      - name: Prepare Site
        run: |
          mkdir -p _site
          
          # Renombramos el HTML de la presentación a index.html para que sea la página principal
          mv fastapi.html _site/index.html
          
          if [ -d "fastapi_files" ]; then 
            mv fastapi_files _site/
          fi
          
          # Copiamos cualquier asset extra como el tema CSS si es que no está ya dentro de fastapi_files
          cp fastapi-theme.scss _site/ 2>/dev/null || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
